<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Lab Grades</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for parsing JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- PapaParse for reading the CSV file -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [students, setStudents] = useState([]);
            const [experiments, setExperiments] = useState([]);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");

            useEffect(() => {
                // Fetch the CSV file directly from the repository
                fetch('GradesCSV.csv')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error("Could not load GradesCSV.csv. Ensure the file is in the exact same directory as this index.html file.");
                        }
                        return response.text();
                    })
                    .then(csvText => {
                        Papa.parse(csvText, {
                            header: true,
                            skipEmptyLines: true,
                            complete: (results) => {
                                const data = results.data;
                                // FIXED: Use PapaParse's built-in meta.fields to guarantee we get the correct column names
                                const headers = results.meta.fields;
                                
                                if (data.length > 0 && headers) {
                                    // Identify columns that are NOT experiments to separate them
                                    const nonExperimentColumns = ['Roll No.', 'Name', 'github_username', 'roster_identifier', 'Total'];
                                    const expHeaders = headers.filter(h => !nonExperimentColumns.includes(h) && h.trim() !== "");
                                    
                                    // Sort students by Roll No
                                    const sortedData = data.sort((a, b) => {
                                        const rollA = parseInt(a['Roll No.'] || 0);
                                        const rollB = parseInt(b['Roll No.'] || 0);
                                        return rollA - rollB;
                                    });

                                    setExperiments(expHeaders);
                                    setStudents(sortedData);
                                }
                                setLoading(false);
                            },
                            error: (err) => {
                                setError("Failed to parse CSV: " + err.message);
                                setLoading(false);
                            }
                        });
                    })
                    .catch(err => {
                        setError(err.message + " (Note: If you are opening this file locally by double-clicking it, your browser might block it due to CORS policies. It will work perfectly once uploaded to GitHub Pages).");
                        setLoading(false);
                    });
            }, []);

            const filteredStudents = useMemo(() => {
                if (!searchQuery) return students;
                return students.filter(student => 
                    (student['Name']?.toLowerCase() || "").includes(searchQuery.toLowerCase()) ||
                    (student['Roll No.'] || "").includes(searchQuery) ||
                    (student['github_username']?.toLowerCase() || "").includes(searchQuery.toLowerCase())
                );
            }, [searchQuery, students]);

            if (loading) {
                return (
                    <div class="flex items-center justify-center min-h-screen">
                        <div class="text-xl font-semibold text-gray-600 animate-pulse">Loading Student Grades...</div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div class="max-w-3xl mx-auto mt-10 p-6 bg-red-50 border border-red-200 rounded-lg text-red-700">
                        <h2 class="text-2xl font-bold mb-4">Error Loading Data</h2>
                        <p>{error}</p>
                    </div>
                );
            }

            // --- STUDENT DETAIL VIEW ---
            if (selectedStudent) {
                return (
                    <div class="max-w-5xl mx-auto p-4 md:p-8">
                        <button 
                            onClick={() => setSelectedStudent(null)}
                            class="mb-6 inline-flex items-center text-indigo-600 hover:text-indigo-800 transition-colors font-medium"
                        >
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                            Back to Student List
                        </button>

                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-8">
                            <div class="bg-indigo-600 px-6 py-8 text-white">
                                <h1 class="text-3xl font-bold mb-2">{selectedStudent['Name'] || "Unknown Student"}</h1>
                                <div class="flex flex-wrap gap-4 text-indigo-100">
                                    <span class="flex items-center">
                                        <svg class="w-5 h-5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"></path></svg>
                                        Roll No: {selectedStudent['Roll No.'] || "N/A"}
                                    </span>
                                    <span class="flex items-center">
                                        <svg class="w-5 h-5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                        GitHub: {selectedStudent['github_username'] || "N/A"}
                                    </span>
                                    {selectedStudent['Total'] && (
                                        <span class="flex items-center font-bold bg-indigo-800 bg-opacity-50 px-3 py-1 rounded-full ml-auto">
                                            Total Score: {selectedStudent['Total']}
                                        </span>
                                    )}
                                </div>
                            </div>
                            
                            <div class="p-0">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-gray-50 border-b border-gray-200">
                                            <th class="px-6 py-4 font-semibold text-gray-600 w-16 text-center">#</th>
                                            <th class="px-6 py-4 font-semibold text-gray-600">Experiment Name</th>
                                            <th class="px-6 py-4 font-semibold text-gray-600 text-right w-32">Points Awarded</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100">
                                        {experiments.map((exp, idx) => {
                                            const points = parseInt(selectedStudent[exp] || 0);
                                            let badgeClass = "bg-gray-100 text-gray-800";
                                            if (points >= 100) badgeClass = "bg-green-100 text-green-800";
                                            else if (points > 0) badgeClass = "bg-yellow-100 text-yellow-800";
                                            else badgeClass = "bg-red-100 text-red-800";

                                            return (
                                                <tr key={idx} class="hover:bg-gray-50 transition-colors">
                                                    <td class="px-6 py-4 text-center text-gray-400 font-medium">{idx + 1}</td>
                                                    <td class="px-6 py-4 font-medium text-gray-800">{exp}</td>
                                                    <td class="px-6 py-4 text-right">
                                                        <span class={`inline-block px-3 py-1 rounded-full text-sm font-bold min-w-[3rem] text-center ${badgeClass}`}>
                                                            {points}
                                                        </span>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- LIST VIEW ---
            return (
                <div class="max-w-6xl mx-auto p-4 md:p-8">
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                        <div>
                            <h1 class="text-3xl font-bold text-gray-900">Lab Grades Dashboard</h1>
                            <p class="text-gray-500 mt-2">Select a student to view their detailed experiment scores.</p>
                        </div>
                        <div class="relative w-full md:w-72">
                            <input 
                                type="text" 
                                placeholder="Search Name or Roll No..." 
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm"
                            />
                            <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-indigo-50 border-b border-indigo-100">
                                        <th class="px-6 py-4 font-semibold text-indigo-900 whitespace-nowrap">Roll No.</th>
                                        <th class="px-6 py-4 font-semibold text-indigo-900 whitespace-nowrap">Student Name</th>
                                        <th class="px-6 py-4 font-semibold text-indigo-900 whitespace-nowrap">GitHub Username</th>
                                        {students.length > 0 && students['Total'] !== undefined && (
                                            <th class="px-6 py-4 font-semibold text-indigo-900 text-right whitespace-nowrap">Total Score</th>
                                        )}
                                        <th class="px-6 py-4 font-semibold text-indigo-900 text-right whitespace-nowrap">Action</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                                    {filteredStudents.length === 0 ? (
                                        <tr>
                                            <td colSpan="5" class="px-6 py-12 text-center text-gray-500">
                                                No students found matching your search.
                                            </td>
                                        </tr>
                                    ) : (
                                        filteredStudents.map((student, idx) => (
                                            <tr 
                                                key={idx} 
                                                onClick={() => setSelectedStudent(student)}
                                                class="hover:bg-indigo-50 cursor-pointer transition-colors group"
                                            >
                                                <td class="px-6 py-4 text-gray-600 font-medium">
                                                    {student['Roll No.'] || "-"}
                                                </td>
                                                <td class="px-6 py-4 font-semibold text-gray-900 group-hover:text-indigo-600 transition-colors">
                                                    {student['Name'] || "-"}
                                                </td>
                                                <td class="px-6 py-4 text-gray-500">
                                                    {student['github_username'] || "-"}
                                                </td>
                                                {student['Total'] !== undefined && (
                                                    <td class="px-6 py-4 text-right font-semibold text-gray-700">
                                                        {student['Total']}
                                                    </td>
                                                )}
                                                <td class="px-6 py-4 text-right">
                                                    <span class="text-sm font-medium text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg group-hover:bg-indigo-600 group-hover:text-white transition-colors inline-flex items-center">
                                                        View Details
                                                        <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
                                                    </span>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
